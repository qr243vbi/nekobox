  publish:
    name: Pack & Publish Release
    runs-on: windows-latest
    needs:
      - build-cpp
    permissions:
      contents: write
      actions: read
    env:
      INPUT_VERSION: ${{ github.event.inputs.tag }}
    if: github.event.inputs.publish == 'true' && github.event.inputs.source_only != 'true'
    steps:
      - name: Checking out sources
        uses: actions/checkout@main
        with:
          ref: 'main'
          submodules: "true"
      - name: Download Artifacts
        uses: actions/download-artifact@main
        with:
          path: download-artifact
      - name: Install Zip, Curl, Jq
        uses: ConorMacBride/install-package@v1
        with:
          choco: zip curl jq
      - name: Pack
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
          INPUT_VERSION: ${{ github.event.inputs.tag }}
          EMAIL: ${{ secrets.EMAIL }}
          UPLOAD_WITH_GH: yes
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          GH_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
        run: |
          source script/env_deploy.sh
          find . -name artifacts.tgz | xargs -n1 tar xvzf
          ##
          cd deployment
          ####
          if [[ -f nekobox_setup.exe ]]; then
            mv nekobox_setup.exe $version_standalone-windows64-installer.exe
            mv windows64 nekobox
            zip -9 -r $version_standalone-windows64.zip nekobox
            rm -rf nekobox windows64
            gh release upload "${INPUT_VERSION}" $version_standalone-windows64-installer.exe --clobber
