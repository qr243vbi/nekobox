# On every push this script is executed
on: 
  workflow_dispatch:
  release:
    types: [created]
name: Build and deploy GH Pages
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: 'main'

      - name: pre_build
        run: |
          regex='s/\[\!\[([^]]*)\]\([^)]*\)\]\(([^)]*)\)/[\1](\2)/g; s@\[GitHub All Releases\]\(https://github.com/qr243vbi/nekobox/releases\)@@g; s@\[Chocolatey Package For Windows\]\(https://community.chocolatey.org/packages/nekobox\)@@g; s@\[obs build result\]\(https://build.opensuse.org/package/show/home:qr243vbi/nekobox\) <br/>@@g; '
          data="$( cat ./pages/content/introduction/_index.md ; cat ./README.md | sed -E "$regex" ; )"
          echo "$data" > ./pages/content/introduction/_index.md

      - name: build_and_deploy
        uses: DeadPoetSpoon/zola-deploy-action@master
        env:
          BUILD_DIR: ./pages
          PAGES_BRANCH: pages
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
