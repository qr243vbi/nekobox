# On every push this script is executed
on: push
name: Build and deploy GH Pages
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          ref: 'main'

      - name: pre_build
        run: |
          data="$( cat ./pages/content/introduction/_index.md ; cat ./README.md | sed -E 's@.*[GitHub All Releases].*@@g; s@.*[Chocolatey Package For Windows].*@@g; s@.*[obs build result].*@@g; s/\[\!\[([^]]*)\]\([^)]*\)\]\(([^)]*)\)/[\1](\2)/g' ; )"
          echo "$data" > ./pages/content/introduction/_index.md

      - name: build_and_deploy
        uses: DeadPoetSpoon/zola-deploy-action@master
        env:
          BUILD_DIR: ./pages
          PAGES_BRANCH: pages
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
