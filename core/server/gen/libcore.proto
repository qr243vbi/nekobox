syntax = "proto3";

package libcore;
option go_package = "/gen";

import "google/protobuf/empty.proto";

message Id {
    uint64 id = 1;
}

message SpeedAndTraffic {
    /*speed*/uint64 download_speed = 1;
    /*speed*/uint64 upload_speed = 2;
    /*speed*/uint64 download_amount = 3;
    /*speed*/uint64 upload_amount = 4;
}

message Stats {
    Id id = 1;
    SpeedAndTraffic stats = 2;
}

message Subscription {
    string url = 1;
    map<string, string> headers = 2;
    bool system_hwid = 3;
    bool custom_headers = 7;
    bool custom_body = 8;
    string payload = 4;
    string javascript = 5;
    Id id = 9;
}

message Group {
    Id id = 1;
    string name = 2;
    repeated uint32 profiles = 3;
}

message Credentials {
    string username = 1;
    string password = 2;
}

message InvalidBean {
}

message ServerAndPort {
    string server = 1;
    int32 port = 2;
}


message Outbound {
    enum Network {
        BOTH = 0;
        UPD = 2;
        TCP = 1;
    }
    enum Quic {
            DISABLED = 0;
            BBR = 1;
            BBR2 = 2;
            CUBIC = 3;
            RENO = 4;
            BBRSTANDARD = 5;
            BBRVARIANT = 6;
    }
    message UdpOverTcp {
        enum Version {
            V2 = 0;
            V1 = 1;
        }
        bool enabled = 1;
        Version version = 2;
    }
    message Brutal {
    }
    message Multiplex {
        enum Protocol {
            UNSPECIFIED = 0;
            SMUX = 1;
            YAMUX = 2;
            K2MUX = 3;
        }
        bool enabled = 1;
        bool padding = 2;
        Protocol protocol = 3;
        int32 max_connections = 4;
        int32 min_streams = 5;
        int32 max_streams = 6;
        Brutal brutal = 7;
    }

    message Tls {
        bool enabled = 15;
        bool disable_sni = 1;
        string server_name = 2;
        bool insecure = 3;
        repeated string alpn = 4;
        repeated string certificate = 5;
        repeated string certificate_public_key_sha256 = 6;
        repeated string client_certificate = 7;
        repeated string client_key = 8;
        uint64 handshake_timeout = 9;
        bool fragment = 10;
        uint64 fragment_fallback_delay = 11;
        bool record_fragment = 12;
        string spoof = 13;
        string spoof_method = 14;
        message Ech {
            bool enabled = 1;
            repeated string config = 2;
            string query_server_name = 3;
        }
        message Utls {
            bool enabled = 1;
            string fingerprint = 2;
        }
        message Reality {
            bool enabled = 1;
            string public_key = 2;
            string short_id = 3;
        }
        Ech ech = 16;
        Utls utls = 17;
        Reality reality = 18;
    }

    message V2RayTransport {
        message Http {
            repeated string host = 1;
            string path = 2;
            string method = 3;
            map<string, string> headers = 4;
            uint64 idle_timeout = 5;
            uint64 ping_timeout = 6;
        }
        message WebSocket {
            string path = 1;
            map<string, string> headers = 2;
            string early_data_header_name = 3;
            uint32 max_early_data = 4;
        }
        message QUIC {
        }
        message gRPC {
            string service_name = 1;
            uint64 idle_timeout = 2;
            uint64 ping_timeout = 3;
            bool permit_without_stream = 4;
        }
        message HttpUpgrade {
            string host = 1;
            string path = 2;
            map<string, string> headers = 3;
        }
        message XHttp {
            message Range {
                int32 from = 1;
                int32 to = 2;
            }
            message XHTTPXmuxOptions {
                Range max_concurrency = 1;   
                Range max_connections = 2;   
                Range c_max_reuse_times = 3;   
                Range h_max_request_times = 4;   
                Range h_max_reusable_secs = 5;
                uint64 h_keep_alive_period = 6;
            }
            message XHTTPBaseOptions {
                string mode = 1;
                string host = 2;
                string path = 3;
                map<string, string> headers = 4;
                uint32 domain_strategy = 5;
                Range x_padding_bytes = 6;
                bool no_grpc_header = 7;
                bool no_sse_header = 8;
                Range sc_max_each_post_bytes = 9;
                Range sc_min_posts_interval_ms = 10;
                int64 sc_max_buffered_posts = 11;
                Range sc_stream_up_server_secs = 12;
                int64 server_max_header_bytes = 13;
                repeated string trusted_x_forwarded_for = 14;
                XHTTPXmuxOptions xmux = 15;
                bool x_padding_obfs_mode = 16;
                string x_padding_key = 17;
                string x_padding_header = 18;
                string x_padding_placement = 19;
                string x_padding_method = 20;
                string uplink_http_method = 21;
                string session_placement = 22;
                string session_key = 23;
                string seq_placement = 24;
                string seq_key = 25;
                string uplink_data_placement = 26;
                string uplink_data_key = 27;
                Range uplink_chunk_size = 28;
            }
            XHTTPBaseOptions base = 1;
            message XHTTPDownloadOptions {
                XHTTPBaseOptions base = 1;
                ServerAndPort address = 2;
                Outbound.Tls tls = 3;
                Id detour_id = 4;
            }
            XHTTPDownloadOptions download = 2;
        }
        message Kcp {
	        uint32 mtu = 1;
	        uint32 tti = 2;
	        uint32 uplink_capacity = 3;
	        uint32 downlink_capacity = 4;
	        bool   congestion = 5;
	        uint32 read_buffer_size = 6;
	        uint32 write_buffer_size = 7;
	        string header_type = 8;
	        string seed = 9;
	        uint32 cwnd_multiplier = 10;
	        uint32 max_sending_window = 11;
        }
    }
}


message SocksBean {
    enum Version {
        V5 = 0;
        V4 = 1;
    }

    Version version = 1;
    Credentials credentials = 2;
    Outbound.Network network = 4;
    Outbound.UdpOverTcp udp_over_tcp = 3;
}

message HttpBean {
    Credentials credentials = 1;
    string path = 2;
    map<string, StringList> headers = 3;
    Outbound.Tls tls = 4;
}

message MieruBean {
    enum Multiplexing {
        OFF = 0;
        lOW = 1;
        MIDDLE = 2;
        HIGH = 3;
    }
    repeated string ports = 1;
    Outbound.Network network = 2;
    Credentials credentials = 3;
    Multiplexing multiplexing = 4;
    string traffic_pattern = 5;
}

message ShadowSocksBean {
    enum Plugin {
        UNSPECIFIED = 0;
        OBFSLOCAL = 1;
        V2RAYPLUGIN = 2;
    }
    string method = 1;
    string password = 2;
    Plugin plugin = 3;
    string plugin_opts = 4;
    Outbound.Network network = 5;
    Outbound.UdpOverTcp udp_over_tcp = 6;
}

message ChainBean {
    repeated uint32 profiles = 1;
}

message TrojanBean {
    string password = 1;
    Outbound.Network network = 2;
    Outbound.Tls tls = 3;
    Outbound.Multiplex multiplex = 4;
    Outbound.V2RayTransport transport = 5;
}

message HysteriaCommon {
    repeated string ports = 1;
    /*duration*/ uint64 hop_interval = 2;
    /*speed*/uint64 up_mbps = 3;
    /*speed*/uint64 down_mbps = 4;
    string obfs = 5;
    Outbound.Network network = 6;
    Outbound.Tls tls = 7;
    string auth_str = 8;
}

message HysteriaBean {
    HysteriaCommon common = 1;
    /*speed*/ uint64 recv_window_conn = 3;
    /*speed*/ uint64 recv_window = 4;
    bool disable_mtu_discovery = 2;
}

message Hy2Bean {
    // auth_str is password here
    HysteriaCommon common = 1;
    bool brutal_debug = 2;
}

message AnyTLSBean {
    string password = 1;
    Outbound.Tls tls = 2;
    /*duration*/ uint64 idle_session_check_interval = 3;
    /*duration*/ uint64 idle_session_timeout = 4;
    uint32 min_idle_session = 5;
}

message ShadowTLSBean {
    enum Version {
        V1 = 0;
        V2 = 1;
        V3 = 2;
    }
    Version version = 1;
    string password = 2;
    Outbound.Tls tls = 3;
}

message WireguardBean {
    string private_key = 7;
    string public_key = 6;
    string pre_shared_key = 5;
    bool persistent_keepalive = 4;
    repeated string local_address = 3;
    uint32 mtu = 1;
    bool use_system_proxy = 2;
}

message AwgBean {
    WireguardBean wireguard = 1;
    int32 jc = 2;
    int32 jmin = 3;
    int32 jmax = 4;
    int32 s1 = 5;
    int32 s2 = 6;
    int32 s3 = 7;
    int32 s4 = 8;

    string h1 = 9;
    string h2 = 10;
    string h3 = 11;
    string h4 = 12;
    
    string i1 = 13;
    string i2 = 14;
    string i3 = 15;
    string i4 = 16;
    string i5 = 17;
}

message TailscaleBean {
    string state_directory = 1;
    string auth_key = 2;
    string control_url = 3;
    bool ephemeral = 4;
    string hostname = 5;
    bool accept_routes = 6;
    string exit_node = 7;
    bool exit_node_allow_lan_access = 8;
    repeated string advertise_routes = 9;
    bool advertise_exit_node = 10;
    bool global_dns = 11;
}

message SSHBean {
    Credentials credentials = 1;
    string private_key = 2;
    string private_key_path = 3; 
    string private_key_passphrase = 4;
    repeated string host_key = 5;
    repeated string host_key_algorithms = 6;
    string client_version = 7;
}

message TorBean {
    string executable_path = 1;
    repeated string extra_args = 2;
    string data_directory = 3;
    map<string, string> torrc = 4;
}

message NaiveBean {
    Credentials credentials = 1;
    int32 insecure_concurrency = 2;
    map<string, string> headers = 3;
    Outbound.UdpOverTcp udp_over_tcp = 4;
    Outbound.Quic quic = 5;
    Outbound.Tls tls = 6;
}

message TrustTunnelBean {
    Credentials credentials = 1;
    bool health_check = 2;
    Outbound.Quic quic = 3;
    Outbound.Tls tls = 4;
}

message JuicityBean {
    // uuid used instead username
    Credentials credentials = 1;
    Outbound.Tls tls = 2;
}

message SnellBean {
    uint32 version = 1;
    string psk = 2;
    bool reuse = 3;
    Outbound.Network network = 4;
    enum ObfsMode {
        UNSPECIFIED = 0;
        HTTP = 1;
        TLS = 2;
    }
    ObfsMode obfs_mode = 5;
    string obfs_host = 6;
}

message CustomBean {
    string core = 1;
    repeated string cmd = 2;
    string config_simple = 3;
    string config_suffix = 4;
    uint32 mapping_port = 5;
    uint32 socks_port = 6;
}

message ExtraBean {
    string socks_address = 1;
    uint32 socks_port = 2;
    string extra_core_path = 3;
    repeated string extra_core_args = 4;
    string extra_core_conf = 5;
    bool no_logs = 6;
}

message TuicBean {
    // uuid instead username
    Credentials credentials = 1;
    enum CongressionControl {
        CUBIC = 0;
        NEWRENO = 2;
        BBR = 1;
    }
    CongressionControl congression_control = 2;
    bool udp_over_stream = 3;
    bool zero_rtt_handshake = 4;
    enum UdpRelayMode {
        NATIVE = 0;
        QUIC = 1;
    }
    UdpRelayMode udp_relay_mode = 5;
    Outbound.Network network = 6;
    uint64 heartbeat = 7;
    Outbound.Tls tls = 8;
}

message IpAddr {
    bool if_ip4 = 2;
    bytes addr = 1;
}

message DialFields {
    string bind_interface = 1;
    IpAddr inet4_bind_address = 2;
    IpAddr inet6_bind_address = 3;
    bool reuse_addr = 4;
    /*duration*/uint64 connect_timeout = 5;
    bool tcp_fast_open = 6;
    bool tcp_multi_path = 7;
    bool disable_tcp_keep_alive = 8;
    /*duration*/uint64 tcp_keep_alive = 9;
    /*duration*/uint64 tcp_keep_alive_interval = 10;
    bool udp_fragment = 11;
    enum NetworkStrategy {
        DEFAULT = 0;
        HYBRID = 1;
        FALLBACK = 2;
    }
    enum NetworkType {
        UNSPECIFIED = 0;
        WIFI = 1;
        CELLULAR = 2;
        ETHERNET = 3;
        OTHER = 4;
    }
    NetworkStrategy network_strategy = 12;
    NetworkType network_type = 13;
    NetworkType fallback_network_type = 14;
    /*duration*/uint64 fallback_delay = 15;
    Id detour_id = 16;
}

message VmessBean {
    enum PacketEncoding {
        UNSPECIFIED = 0;
        PACKETADDR = 1;
        XUDP = 2;
    }
    string uuid = 1;
    int32 alter_id = 2;
    bool global_padding = 3;
    bool authentication_length = 4;
    Outbound.Network network = 5;
    PacketEncoding packet_encoding = 7;
    Outbound.Tls tls = 6;
    Outbound.Multiplex multiplex = 8;
    Outbound.V2RayTransport transport = 9;
}


message VlessBean {
    string uuid = 1;
    string flow = 2;
    Outbound.Network network = 3;
    VmessBean.PacketEncoding packet_encoding = 4;
    Outbound.Tls tls = 5;
    string encryption = 6;
    Outbound.Multiplex multiplex = 8;
    Outbound.V2RayTransport transport = 7;
}

message DirectBean {
    bool block = 1;
}

message Bean {
    Id id = 1;
    oneof bean {
        InvalidBean invalid = 4;
        MieruBean mieru = 5;
        ShadowSocksBean shadowsocks = 6;
        ChainBean chain = 7;
        VlessBean vless = 8;
        TrojanBean trojan = 9;
        HysteriaBean hysteria = 10;
        Hy2Bean hysteria2 = 11;
        TuicBean tuic = 12;
        AnyTLSBean anytls = 13;
        ShadowTLSBean shadowtls = 14;
        WireguardBean wireguard = 15;
        AwgBean amnezia = 16;
        TailscaleBean tailscale = 17;
        SSHBean ssh = 18;
        TorBean tor = 19;
        NaiveBean naive = 20;
        TrustTunnelBean trusttunnel = 21;
        JuicityBean juicity = 22;
        SnellBean snell = 23;
        CustomBean custom = 24;
        ExtraBean extra = 25;
        VmessBean vmess = 26;
        SocksBean socks = 27;
        DirectBean direct = 28;
        HttpBean http = 29;
    };
    DialFields dial_fields = 2;
    ServerAndPort address = 3;
}

