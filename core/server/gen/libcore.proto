syntax = "proto3";

package libcore;
option go_package = "/gen";

message SpeedAndTraffic {
    uint32 download_speed = 1;
    uint32 upload_speed = 2;
    uint32 download_amount = 3;
    uint32 upload_amount = 4;
}

message Stats {
    SpeedAndTraffic proxy_sat = 1;
    SpeedAndTraffic direct_sat = 2;
}

message Subscription {
    string url = 1;
    map<string, string> headers = 2;
    bool system_hwid = 3;
    bool custom_headers = 7;
    bool custom_body = 8;
    string payload = 4;
    string javascript = 5;
    uint32 id = 9;
}

message Group {
    uint32 id = 1;
    string name = 2;
    repeated uint32 profiles = 3;
}

message InvalidBean {
}

message Outbound {
    enum Network {
        BOTH = 0;
        UPD = 2;
        TCP = 1;
    }
    message Quic {
        bool enabled = 1;
        enum Method {
            BBR = 0;
            BBR2 = 1;
            CUBIC = 2;
            RENO = 3;
        }
        Method method = 2;
    }
    message UdpOverTcp {
        enum Version {
            V2 = 0;
            V1 = 1;
        }
        bool enabled = 1;
        Version version = 2;
    }
    message Brutal {
    }
    message Multiplex {
        enum Protocol {
            UNSPECIFIED = 0;
            SMUX = 1;
            YAMUX = 2;
            K2MUX = 3;
        }
        bool enabled = 1;
        bool padding = 2;
        Protocol protocol = 3;
        int32 max_connections = 4;
        int32 min_streams = 5;
        int32 max_streams = 6;
        Brutal brutal = 7;
    }

    message Tls {
    }

    message V2RayTransport {
    }

    message Duration {
    }

}

message Credentials {
    string username = 1;
    string password = 2;
}

message SocksBean {
    enum Version {
        V5 = 0;
        V4 = 1;
    }

    Version version = 1;
    Credentials credentials = 2;
    Outbound.Network network = 4;
    Outbound.UdpOverTcp udp_over_tcp = 3;
}

message HttpBean {
    Credentials credentials = 1;
    string path = 2;
    map<string, string> headers = 3;
    Outbound.Tls tls = 4;
}

message MieruBean {
    enum Multiplexing {
        OFF = 0;
        lOW = 1;
        MIDDLE = 2;
        HIGH = 3;
    }
    StringList ports = 1;
    Outbound.Network network = 2;
    Credentials credentials = 3;
    Multiplexing multiplexing = 4;
    string traffic_pattern = 5;
}

message ShadowSocksBean {
    enum Plugin {
        UNSPECIFIED = 0;
        OBFSLOCAL = 1;
        V2RAYPLUGIN = 2;
    }
    string method = 1;
    string password = 2;
    Plugin plugin = 3;
    string plugin_opts = 4;
    Outbound.Network network = 5;
    Outbound.UdpOverTcp udp_over_tcp = 6;
}

message ChainBean {
    repeated uint32 profiles = 1;
}

message TrojanBean {
    string password = 1;
    Outbound.Network network = 2;
    Outbound.Tls tls = 3;
    Outbound.Multiplex multiplex = 4;
    Outbound.V2RayTransport transport = 5;
}

message HysteriaBean {

}

message Hy2Bean {
}

message AnyTLSBean {
    string password = 1;
    Outbound.Tls tls = 2;
    Outbound.Duration idle_session_check_interval = 3;
    Outbound.Duration idle_session_timeout = 4;
    uint32 min_idle_session = 5;
}

message ShadowTLSBean {
    enum Version {
        V1 = 0;
        V2 = 1;
        V3 = 2;
    }
    Version version = 1;
    string password = 2;
    Outbound.Tls tls = 3;
}

message WireguardBean {
}

message TailscaleBean {
}

message SSHBean {
}

message TorBean {
}

message NaiveBean {
    Credentials credentials = 1;
    int32 insecure_concurrency = 2;
    map<string, string> headers = 3;
    Outbound.UdpOverTcp udp_over_tcp = 4;
    Outbound.Quic quic = 5;
    Outbound.Tls tls = 6;
}

message TrustTunnelBean {
}

message JuicityBean {
}

message ShellBean {
}

message CustomBean {
}

message ExtraBean {
}

message BalancerBean {
}

message TuicBean {
}

message AwgBean {
    WireguardBean wireguard = 1;
}

message DialFields {
}

message VmessBean {
    enum PacketEncoding {
        UNSPECIFIED = 0;
        PACKETADDR = 1;
        XUDP = 2;
    }
    string uuid = 1;
    int32 alter_id = 2;
    bool global_padding = 3;
    bool authentication_length = 4;
    Outbound.Network network = 5;
    PacketEncoding packet_encoding = 7;
    Outbound.Tls tls = 6;
    Outbound.Multiplex multiplex = 8;
    Outbound.V2RayTransport transport = 9;
}


message VlessBean {
    string uuid = 1;
    string flow = 2;
    Outbound.Network network = 3;
    VmessBean.PacketEncoding packet_encoding = 4;
    Outbound.Tls tls = 5;
    string encryption = 6;
    Outbound.Multiplex multiplex = 8;
    Outbound.V2RayTransport transport = 7;
}

message Bean {
    uint32 id = 1;
    oneof bean {
        InvalidBean invalid = 3;
        HttpBean http = 4;
        MieruBean mieru = 5;
        ShadowSocksBean shadowsocks = 6;
        ChainBean chain = 7;
        VlessBean vless = 8;
        TrojanBean trojan = 9;
        HysteriaBean hysteria = 10;
        Hy2Bean hysteria2 = 11;
        TuicBean tuic = 12;
        AnyTLSBean anytls = 13;
        ShadowTLSBean shadowtls = 14;
        WireguardBean wireguard = 15;
        AwgBean amnezia = 16;
        TailscaleBean tailscale = 17;
        SSHBean ssh = 18;
        TorBean tor = 19;
        NaiveBean naive = 20;
        TrustTunnelBean trusttunnel = 21;
        JuicityBean juicity = 22;
        ShellBean shell = 23;
        CustomBean custom = 24;
        ExtraBean extra = 25;
        BalancerBean balancer = 26;
        SocksBean socks = 27;
        VmessBean vmess = 28;
    };
    DialFields dial_fields = 2;
}

