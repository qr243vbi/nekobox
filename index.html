<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta charset="UTF-8" />
    <title>My Docs</title>

    <!-- Docsify theme -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css"
    />

    <!-- Magenta Theme Customization -->
    <style>
      :root {
        --theme-color: #d81b60;
        --theme-color-secondary: #ad1457;
        --sidebar-name-color: #d81b60;
        --link-color: #d81b60;
        --link-color-hover: #ad1457;
        --selection-color: rgba(216, 27, 96, 0.2);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      /* Sidebar styling */
      .sidebar {
        border-right: 1px solid rgba(216, 27, 96, 0.15);
      }

      .sidebar ul li.active > a {
        color: var(--theme-color);
        font-weight: 600;
      }

      /* Links */
      .markdown-section a {
        color: var(--theme-color);
        font-weight: 500;
      }

      .markdown-section a:hover {
        color: var(--theme-color-secondary);
      }

      /* Headings */
      .markdown-section h1,
      .markdown-section h2,
      .markdown-section h3 {
        color: #ad1457;
      }

      /* Code blocks */
      .markdown-section pre {
        border-left: 4px solid #d81b60;
      }

      /* Scrollbar (Chrome/Edge) */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-thumb {
        background: #d81b60;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <div id="main">Loading...</div>

    <script>
      window.$docsify = {
        el: "#main",
        name: "My Docs",
        repo: "",
        loadNavbar: "docs/NAVBAR.md",
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
      };
    </script>

    <!-- Docsify -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  </body>
</html>
