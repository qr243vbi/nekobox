services:
 myapp:
  platform: linux/${GUEST_ARCH:-x86_64}
  privileged: true
  devices:
    - "/dev/fuse:/dev/fuse"
  build:
    context: script
    dockerfile: Dockerfile
  volumes:
    - .:/app:rw,Z,U   # bind current directory to /app in container
  working_dir: /app
  tty: true    # optional, keeps container running for interactive shell
